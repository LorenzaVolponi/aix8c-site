version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "04:30"
    open-pull-requests-limit: 15
    versioning-strategy: increase-if-necessary
    labels:
      - "dependencies"
      - "security"
    groups:
      react-stack:
        patterns:
          - "react*"
          - "@types/react*"
      vite-stack:
        patterns:
          - "vite*"
          - "@vitejs/*"
      lint-stack:
        patterns:
          - "eslint*"
          - "typescript*"
    ignore:
      - dependency-name: "node"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "05:00"
    labels:
      - "dependencies"
      - "github-actions"
