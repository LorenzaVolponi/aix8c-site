name: Unified Autopilot (Resolve + Fix + Merge + Deploy)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  checks: read
  pages: write
  id-token: write

jobs:
  pr-autopilot:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Try auto-resolve conflicts with main
        run: |
          set +e
          AUTO_RESOLVE_CODE=true ./scripts/auto-resolve-conflicts.sh main
          RESOLVE_STATUS=$?
          set -e
          if [ "$RESOLVE_STATUS" -ne 0 ]; then
            echo "Conflitos não puderam ser resolvidos automaticamente."
            exit 1
          fi

      - name: Install and auto-fix
        run: |
          npm ci
          npm run lint -- --fix
          npm run typecheck
          npm run build

      - name: Commit auto-fixes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore: auto-resolve conflicts and auto-fix PR"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Merge PR automatically
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              merge_method: 'squash'
            });

  deploy-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install and verify
        run: |
          npm ci
          npm run ci:verify

      - name: Build Pages artifact
        env:
          VITE_BASE_PATH: /aix8c-site/
        run: |
          npm run build
          cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy pages
        id: deployment
        uses: actions/deploy-pages@v4
