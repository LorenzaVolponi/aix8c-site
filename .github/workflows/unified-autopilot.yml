name: Unified Autopilot (Resolve + Fix + Merge + Deploy)

on:
  pull_request_target:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: autopilot-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  checks: read
  pages: write
  id-token: write

jobs:
  pr-autopilot:
    if: github.event_name == 'pull_request_target' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR source
        id: source
        run: |
          if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "same_repo=false" >> "$GITHUB_OUTPUT"
          else
            echo "same_repo=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on fork PR limitations
        if: steps.source.outputs.same_repo != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: 'ℹ️ PR de fork detectada: por segurança, a automação não aplica push automático em branches externas. Para merge automático, abra PR a partir de branch dentro deste repositório.'
            });

      - name: Checkout PR branch (head)
        if: steps.source.outputs.same_repo == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        if: steps.source.outputs.same_repo == 'true'
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure git
        if: steps.source.outputs.same_repo == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Try auto-resolve conflicts with base branch
        if: steps.source.outputs.same_repo == 'true'
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set +e
          git fetch origin "${BASE_REF}" --depth=1
          AUTO_RESOLVE_CODE=true ./scripts/auto-resolve-conflicts.sh "${BASE_REF}"
          RESOLVE_STATUS=$?
          set -e
          if [ "$RESOLVE_STATUS" -ne 0 ]; then
            echo "auto_resolve_failed=true" >> "$GITHUB_ENV"
          fi

      - name: Install and auto-fix
        if: steps.source.outputs.same_repo == 'true' && env.auto_resolve_failed != 'true'
      - name: Try auto-resolve conflicts with main
        run: |
          set +e
          AUTO_RESOLVE_CODE=true ./scripts/auto-resolve-conflicts.sh main
          RESOLVE_STATUS=$?
          set -e
          if [ "$RESOLVE_STATUS" -ne 0 ]; then
            echo "Conflitos não puderam ser resolvidos automaticamente."
            exit 1
          fi

      - name: Install and auto-fix
        run: |
          npm ci
          npm run lint -- --fix
          npm run typecheck
          npm run build

      - name: Commit auto-fixes
        if: steps.source.outputs.same_repo == 'true' && env.auto_resolve_failed != 'true'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore: auto-resolve conflicts and auto-fix PR"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Merge PR automatically
        if: steps.source.outputs.same_repo == 'true' && env.auto_resolve_failed != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              merge_method: 'squash'
            });

      - name: Comment when auto-resolve fails
        if: steps.source.outputs.same_repo == 'true' && env.auto_resolve_failed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: '⚠️ Não consegui resolver todos os conflitos automaticamente nesta execução. Reenvie a PR sincronizada com a base para nova tentativa automática.'
            });

  deploy-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install and verify
        run: |
          npm ci
          npm run ci:verify

      - name: Build Pages artifact
        env:
          VITE_BASE_PATH: /aix8c-site/
        run: |
          npm run build
          cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy pages
        id: deployment
        uses: actions/deploy-pages@v4
