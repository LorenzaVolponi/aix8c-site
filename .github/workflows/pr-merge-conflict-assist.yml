name: PR Merge Conflict Assist

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-with-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Try merging main into PR branch
        id: merge_main
        run: |
          git fetch origin main
          if git merge --no-edit origin/main; then
            echo "merge_status=clean" >> "$GITHUB_OUTPUT"
          else
            echo "merge_status=conflict" >> "$GITHUB_OUTPUT"
            echo "conflicts<<EOF" >> "$GITHUB_OUTPUT"
            git diff --name-only --diff-filter=U >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            git merge --abort
          fi

      - name: Push merge commit
        if: steps.merge_main.outputs.merge_status == 'clean'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Comment conflict details
        if: steps.merge_main.outputs.merge_status == 'conflict'
        uses: actions/github-script@v7
        with:
          script: |
            const files = `${{ steps.merge_main.outputs.conflicts }}`.trim();
            const body = [
              '⚠️ Não consegui resolver conflitos automaticamente com `main`.',
              '',
              'Arquivos com conflito:',
              files ? files.split('\n').map(f => `- `' + f + '`').join('\n') : '- (não identificado)'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
