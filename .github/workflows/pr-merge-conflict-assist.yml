name: PR Merge Conflict Assist

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      auto_resolve_code:
        description: "Tentar resolução automática também para arquivos de código"
        required: true
        default: "false"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-with-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Auto-resolve conflict strategy
        id: resolve
        run: |
          set +e
          AUTO_RESOLVE_CODE=${{ github.event.inputs.auto_resolve_code || "false" }} ./scripts/auto-resolve-conflicts.sh main
          STATUS=$?
          set -e
          if [ "$STATUS" -eq 0 ]; then
            echo "merge_status=resolved" >> "$GITHUB_OUTPUT"
          else
            echo "merge_status=manual_required" >> "$GITHUB_OUTPUT"
            echo "conflicts<<EOF" >> "$GITHUB_OUTPUT"
            git diff --name-only --diff-filter=U >> "$GITHUB_OUTPUT" || true
            echo "EOF" >> "$GITHUB_OUTPUT"
            git merge --abort || true
          fi

      - name: Run verification after auto-resolution
        if: steps.resolve.outputs.merge_status == 'resolved'
        run: npm ci && npm run ci:verify

      - name: Push resolved branch
        if: steps.resolve.outputs.merge_status == 'resolved'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Comment manual action required
        if: steps.resolve.outputs.merge_status == 'manual_required'
        uses: actions/github-script@v7
        with:
          script: |
            const files = `${{ steps.resolve.outputs.conflicts }}`.trim();
            const body = [
              '⚠️ Conflitos não resolvidos automaticamente.',
              '',
              'Arquivos com conflito:',
              files ? files.split('\n').map(f => `- `' + f + '`').join('\n') : '- (não identificado)',
              '',
              'A automação tentou estratégia para lockfiles/arquivos de metadados. Para código-fonte, intervenção manual é necessária.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
