name: Stale Issues and PRs

on:
  schedule:
    - cron: '0 3 * * 2'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: 'Este item ficou inativo por 30 dias e foi marcado como stale.'
          stale-pr-message: 'Esta PR ficou inativa por 30 dias e foi marcada como stale.'
