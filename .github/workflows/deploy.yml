name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate build
        run: bash scripts/build-check.sh

      - name: Ensure clean push flow for Vercel Git integration
        run: echo "Build validated. If Vercel GitHub integration is enabled, deployment is triggered by clean push to main."

      - name: Optional deploy via Vercel CLI
        if: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != '' }}
        run: |
          npm i -g vercel
          vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
          vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
          vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
