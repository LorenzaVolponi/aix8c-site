name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect package manager
        id: pm
        run: |
          if [ -f package-lock.json ]; then
            echo "name=npm" >> "$GITHUB_OUTPUT"
            echo "install=npm ci" >> "$GITHUB_OUTPUT"
          elif [ -f pnpm-lock.yaml ]; then
            echo "name=pnpm" >> "$GITHUB_OUTPUT"
            echo "install=npm i -g pnpm && pnpm install --frozen-lockfile" >> "$GITHUB_OUTPUT"
          elif [ -f yarn.lock ]; then
            echo "name=yarn" >> "$GITHUB_OUTPUT"
            echo "install=yarn install --frozen-lockfile" >> "$GITHUB_OUTPUT"
          elif [ -f bun.lockb ]; then
            echo "name=bun" >> "$GITHUB_OUTPUT"
            echo "install=npm i -g bun && bun install --frozen-lockfile" >> "$GITHUB_OUTPUT"
          else
            echo "name=npm" >> "$GITHUB_OUTPUT"
            echo "install=npm install" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: ${{ steps.pm.outputs.install }}

      - name: Run lint when available
        run: |
          if npm run | grep -qE '^\s*lint\b'; then
            npm run lint
          else
            echo "No lint script found, skipping."
          fi

      - name: Run tests when available
        run: |
          if npm run | grep -qE '^\s*test\b'; then
            npm test -- --ci
          else
            echo "No test script found, skipping."
          fi

      - name: Run build
        run: npm run build
