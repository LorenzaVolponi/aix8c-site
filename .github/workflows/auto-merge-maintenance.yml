name: Auto Merge Maintenance PRs

on:
  pull_request_target:
    types: [labeled, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'automated') ||
      github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge for safe maintenance PRs
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.info('Manual dispatch: skipping PR-specific auto-merge action.');
              return;
            }

            const pr = context.payload.pull_request;
            if (!pr) {
              core.info('No PR payload available.');
              return;
            }

            const labels = (pr.labels || []).map(l => l.name);
            const isAutomated = labels.includes('automated') || context.actor === 'dependabot[bot]';
            const hasBlockLabel = labels.includes('no-automerge') || labels.includes('major-update');

            if (!isAutomated || hasBlockLabel || pr.draft) {
              core.info('PR is not eligible for auto-merge.');
              return;
            }

            await github.graphql(`
              mutation($id: ID!) {
                enablePullRequestAutoMerge(input: { pullRequestId: $id, mergeMethod: SQUASH }) {
                  clientMutationId
                }
              }
            `, { id: pr.node_id });

            core.info(`Auto-merge enabled for PR #${pr.number}`);
