  <body>
    <div id="root"></div>
    <script>
      window.renderStaticFallback = function renderStaticFallback() {
        const root = document.getElementById('root');
        if (!root) return;
        root.innerHTML = `
          <main style="min-height:100vh;display:grid;place-items:center;background:#06070f;color:#fff;font-family:Inter,Arial,sans-serif;padding:24px;">
            <section style="max-width:760px;width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:28px;">
              <h1 style="margin:0 0 12px;font-size:2rem;">AIX8C — Lorenza Volponi</h1>
              <p style="opacity:.9;line-height:1.6;margin:0 0 16px;">
                O modo completo (React + Vite) precisa das dependências npm instaladas.
                Enquanto isso, este modo estático mantém o site no ar.
              </p>
              <p style="opacity:.8;line-height:1.6;margin:0 0 20px;">
                Assim que o ambiente liberar acesso ao registry e o build for concluído, a experiência completa volta automaticamente.
              </p>
              <button onclick="window.location.reload()" style="padding:10px 16px;border-radius:999px;border:0;background:#f59e0b;color:#161616;font-weight:700;cursor:pointer;">Tentar modo completo</button>
            </section>
          </main>
        `;
      };
      setTimeout(() => {
        const root = document.getElementById('root');
        if (root && root.childElementCount === 0) window.renderStaticFallback();
      }, 2500);
    </script>
    <script type="module" src="/src/main.tsx" onerror="window.renderStaticFallback()"></script>
  </body>
